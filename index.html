<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVANREAK AI PDF TO WORD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruuy Pro', sans-serif; background-color: #0b3a1a; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#e1e5e2] rounded-3xl p-6 shadow-2xl border-4 border-[#3ca25d]/30 relative overflow-hidden">
        
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center border-2 border-gray-200 p-1 shadow-md">
                <div class="w-full h-full bg-gradient-to-tr from-blue-600 to-green-500 rounded-full flex flex-col items-center justify-center text-white text-[10px] font-bold leading-none">
                    <span class="text-yellow-300 font-extrabold text-sm">NSR</span>
                    <span>TECHNOLOGY</span>
                </div>
            </div>
        </div>

        <h1 class="text-center text-xl md:text-2xl font-black text-[#89b83b] tracking-wide mb-6 uppercase">
            SOVANREAK AI PDF TO WORD
        </h1>

        <div id="drop-zone" class="bg-[#7c8b96] hover:bg-[#6c7b86] transition-all rounded-2xl p-8 flex flex-col items-center justify-center border-2 border-dashed border-gray-400 cursor-pointer text-center group mb-6">
            <input type="file" id="file-input" accept=".pdf" class="hidden" />
            
            <div id="icon-container" class="w-16 h-16 bg-[#22c55e] rounded-xl flex items-center justify-center shadow-md mb-4">
                <svg id="status-icon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            
            <span class="text-white font-semibold text-lg mb-1" id="upload-text">ជ្រើសរើសឯកសារ PDF</span>
            <span class="text-gray-300 text-xs" id="sub-text">(ទំហំឯកសារអតិបរមា 15MB)</span>
            
            <a id="download-link" class="hidden mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-xl shadow-md transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                ទាញយកឯកសារ Word
            </a>
        </div>

        <div id="progress-container" class="hidden flex flex-col items-center justify-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-solid border-emerald-500 border-r-transparent mb-4"></div>
            <p id="status-text" class="text-[#22c55e] font-semibold text-sm animate-pulse mb-3">
                កំពុងផ្ញើឯកសារទៅកាន់ Gemini AI...
            </p>
        </div>

    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadText = document.getElementById('upload-text');
        const subText = document.getElementById('sub-text');
        const iconContainer = document.getElementById('icon-container');
        const downloadLink = document.getElementById('download-link');
        const progressContainer = document.getElementById('progress-container');
        const statusText = document.getElementById('status-text');

        dropZone.addEventListener('click', (e) => {
            if (e.target !== downloadLink && !downloadLink.contains(e.target)) fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) uploadAndConvert(e.target.files[0]);
        });

        async function uploadAndConvert(file) {
            // បង្ហាញ Loading
            progressContainer.classList.remove('hidden');
            downloadLink.classList.add('hidden');
            uploadText.innerText = "កំពុងដំណើរការ...";
            statusText.innerText = "Gemini AI កំពុងវិភាគ និងបំប្លែងអត្ថបទខ្មែរ...";

            const formData = new FormData();
            formData.append('pdf_file', file);

            try {
                // ផ្ញើទៅកាន់ Backend (រត់នៅលើ Localhost Port 5000)
                const response = await fetch('http://localhost:5000/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('ការបំប្លែងមានបញ្ហា');

                // ទទួលយក File Word (Blob) ពី Backend
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                
                // រៀបចំដូរ UI ទៅជាជោគជ័យ
                progressContainer.classList.add('hidden');
                uploadText.innerText = "បំប្លែងជោគជ័យ!";
                subText.innerText = "ចុចប៊ូតុងខាងក្រោមដើម្បីទាញយក";
                iconContainer.className = "w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center shadow-md mb-4 animate-bounce";
                
                // បើកប៊ូតុងទាញយក
                downloadLink.href = downloadUrl;
                downloadLink.download = file.name.replace('.pdf', '.docx');
                downloadLink.classList.remove('hidden');

            } catch (error) {
                alert("កំហុស៖ " + error.message);
                progressContainer.classList.add('hidden');
                uploadText.innerText = "ជ្រើសរើសឯកសារ PDF ម្តងទៀត";
            }
        }
    </script>
</body>
</html>
