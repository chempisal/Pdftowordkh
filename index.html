<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVANREAK AI PDF TO WORD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body {
            font-family: 'Kantumruuy Pro', sans-serif;
            background-color: #0b3a1a;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#e1e5e2] rounded-3xl p-6 shadow-2xl border-4 border-[#3ca25d]/30 relative overflow-hidden">
        
        <div class="mb-4 bg-white p-3 rounded-xl shadow-sm">
            <label class="block text-xs font-bold text-gray-700 mb-1">សូមដាក់ Gemini API Key របស់អ្នក៖</label>
            <input type="password" id="api-key" class="w-full text-xs p-2 border rounded-lg focus:outline-none focus:border-emerald-500" placeholder="AIzaSy..." />
        </div>

        <div class="flex justify-center mb-4">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center border-2 border-gray-200 p-1 shadow-md">
                <div class="w-full h-full bg-gradient-to-tr from-blue-600 to-green-500 rounded-full flex flex-col items-center justify-center text-white text-[9px] font-bold leading-none">
                    <span class="text-yellow-300 font-extrabold text-xs">NSR</span>
                    <span>TECHNOLOGY</span>
                </div>
            </div>
        </div>

        <h1 class="text-center text-lg md:text-xl font-black text-[#89b83b] tracking-wide mb-4 uppercase">
            SOVANREAK AI PDF TO WORD
        </h1>

        <div id="drop-zone" class="bg-[#7c8b96] hover:bg-[#6c7b86] transition-all rounded-2xl p-8 flex flex-col items-center justify-center border-2 border-dashed border-gray-400 cursor-pointer text-center group mb-4">
            <input type="file" id="file-input" accept=".pdf" class="hidden" />
            
            <div id="icon-container" class="w-16 h-16 bg-[#22c55e] rounded-xl flex items-center justify-center shadow-md mb-4 group-hover:scale-105 transition-transform">
                <svg id="pdf-icon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            
            <span class="text-white font-semibold text-base mb-1" id="upload-text">ជ្រើសរើសឯកសារ PDF</span>
            <span class="text-gray-300 text-xs" id="sub-text">(ទំហំឯកសារអតិបរមា 15MB)</span>
            
            <button id="download-btn" class="hidden mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-xl shadow-md transition-all flex items-center gap-2 mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                ទាញយកឯកសារ Word
            </button>
        </div>

        <div id="progress-container" class="hidden flex flex-col items-center justify-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-solid border-emerald-500 border-r-transparent align-[-0.125em] mb-4"></div>
            <p id="status-text" class="text-[#22c55e] font-semibold text-sm animate-pulse mb-3">
                កំពុងចាប់ផ្តើម...
            </p>
            <div class="w-full bg-gray-300 rounded-full h-2.5 overflow-hidden">
                <div id="progress-bar" class="bg-[#22c55e] h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

    </div>

    <script>
        // កំណត់ទីតាំង Worker សម្រាប់ PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadText = document.getElementById('upload-text');
        const subText = document.getElementById('sub-text');
        const iconContainer = document.getElementById('icon-container');
        const pdfIcon = document.getElementById('pdf-icon');
        const downloadBtn = document.getElementById('download-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const apiKeyInput = document.getElementById('api-key');

        let convertedText = ""; // រក្សាទុកអត្ថបទដែលបំប្លែងរួច

        dropZone.addEventListener('click', (e) => {
            if (e.target !== downloadBtn && !downloadBtn.contains(e.target)) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', async (e) => {
            if(e.target.files.length > 0) {
                const apiKey = apiKeyInput.value.trim();
                if(!apiKey) {
                    alert("សូមបញ្ចូល Gemini API Key របស់អ្នកជាមុនសិន!");
                    return;
                }
                const file = e.target.files[0];
                await processPdfToWord(file, apiKey);
            }
        });

        // មុខងារចម្បងអាន PDF និងផ្ញើទៅ Gemini AI
        async function processPdfToWord(file, apiKey) {
            downloadBtn.classList.add('hidden');
            progressContainer.classList.remove('hidden');
            progressBar.style.width = "100%";
            
            try {
                // ជំហានទី ១: អានអត្ថបទពី PDF
                statusText.innerText = "ជំហានទី ១: កំពុងទាញយកអត្ថបទពី PDF...";
                const fileReader = new FileReader();
                
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let extractedText = "";
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        extractedText += pageText + "\n";
                    }
                    
                    if(!extractedText.trim()){
                        throw new Error("មិនអាចអានអត្ថបទពី PDF នេះបានទេ (ឯកសារអាចជាប្រភេទរូបភាពស្កេន)");
                    }

                    // ជំហានទី ២: ផ្ញើទៅកាន់ Gemini AI ដើម្បីកែសម្រួលទម្រង់
                    statusText.innerText = "ជំហានទី ២: កំពុងប្រើប្រាស់ Gemini AI រៀបចំទម្រង់អក្សរ...";
                    await sendToGemini(extractedText, apiKey);
                };
                
                fileReader.readAsArrayBuffer(file);

            } catch (error) {
                alert("មានបញ្ហា: " + error.message);
                progressContainer.classList.add('hidden');
            }
        }

        // មុខងារហៅទៅកាន់ Gemini API
        async function sendToGemini(text, apiKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const prompt = `You are an expert document converter. Fix the layout, spelling, paragraphs, and structure of the following text extracted from a PDF document. Ensure that the Khmer text is natural, well-formatted, and completely readable for a Microsoft Word document. Return only the clean corrected document text without any conversational words or markdown block like \`\`\`. Text: \n\n${text}`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    convertedText = data.candidates[0].content.parts[0].text;
                    showSuccessState();
                } else {
                    throw new Error("ការឆ្លើយតបពី AI មានបញ្ហា។");
                }
            } catch (error) {
                alert("Gemini API Error: " + error.message);
                progressContainer.classList.add('hidden');
            }
        }

        // បង្ហាញ UI ពេលជោគជ័យ
        function showSuccessState() {
            statusText.innerText = "បំប្លែងជោគជ័យ ១០០%!";
            uploadText.innerText = "បំប្លែងរួចរាល់!";
            subText.innerText = "ចុចប៊ូតុងខាងក្រោមដើម្បីទាញយកឯកសារ Word";
            iconContainer.className = "w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center shadow-md mb-4 animate-bounce mx-auto";
            
            // ប្តូរ Icon ទៅជាទម្រង់សៀវភៅ/Word
            pdfIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />`;
            
            downloadBtn.classList.remove('hidden');
        }

        // ដំណើរការទាញយកឯកសារ Word ពិតប្រាកដ (.doc)
        downloadBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            
            // បង្កើត Blob ជាប្រភេទឯកសារ Word (MS-Word)
            const blob = new Blob(['\ufeff' + convertedText], {
                type: 'application/msword;charset=utf-8'
            });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Converted_Document.doc'; // កំណត់ឈ្មោះឯកសារទាញយក
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
